<h2>Lecturer Dashboard</h2>

<p>Welcome, {{ request.user.username }}</p>

<hr>

<h3>Your Courses</h3>

<table border="1">
  <tr>
    <th>Course Code</th>
    <th>Course Name</th>
    <th>Action</th>
  </tr>

  {% for course in courses %}
  <tr>
    <td>{{ course.code }}</td>
    <td>{{ course.name }}</td>
    <td>
      <a href="{% url 'enter_grades' course.id %}">
        Enter Grades
      </a>
    </td>
  </tr>
  {% empty %}
  <tr>
    <td colspan="3">No courses assigned.</td>
  </tr>
  {% endfor %}
</table>
