<!DOCTYPE html>
<html>
<head>
    <title>Course Detail</title>

    <style>
        body {
            font-family: Arial;
            background: #f4f6f9;
            margin: 0;
        }

        .header {
            background: #1f3c88;
            color: white;
            padding: 20px;
        }

        .container {
            width: 80%;
            margin: 30px auto;
        }

        .card {
            background: white;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            padding: 12px;
            border-bottom: 1px solid #ddd;
        }

        th {
            background: #f0f0f0;
        }
    </style>
</head>

<body>

<div class="header">
    <h2>{{ course.name }}</h2>
</div>

<div class="container">

    <div class="card">
        <h3>Course Overview</h3>
        <p><strong>Code:</strong> {{ course.code }}</p>
        <p><strong>Description:</strong> {{ course.description }}</p>
    </div>

    <div class="card">
        <h3>Your Performance</h3>

        <table>
            <tr>
                <th>Status</th>
                <th>Final Mark</th>
            </tr>

            {% for e in enrollments %}
            <tr>
                <td>{{ e.status }}</td>
                <td>{{ e.final_mark }}</td>
            </tr>
            {% empty %}
            <tr>
                <td colspan="2">No data available</td>
            </tr>
            {% endfor %}
        </table>

    </div>

</div>

</body>
</html>
