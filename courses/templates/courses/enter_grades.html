<h2>Enter Grades</h2>

<form method="post">
  {% csrf_token %}

  <table border="1">
    <thead>
      <tr>
        <th>Student</th>
        {% for item in assessment_items %}
          <th>{{ item.name }}</th>
        {% endfor %}
      </tr>
    </thead>

    <tbody>
      {% for enrollment in enrollments %}
        <tr>
          <td>{{ enrollment.student }}</td>
          {% for item in assessment_items %}
            <td>
              <input
                type="number"
                step="0.01"
                name="grade_{{ enrollment.id }}_{{ item.id }}"
              >
            </td>
          {% endfor %}
        </tr>
      {% endfor %}
    </tbody>
  </table>

  <button type="submit">Save Grades</button>
</form>
