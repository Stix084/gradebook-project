<h2>Enter Grades</h2>

<form method="post">
  {% csrf_token %}

  <table border="1">
    <thead>
      <tr>
        <th>Student</th>
        {% for assessment in assessments %}
          <th>{{ assessment.title }}</th>
        {% endfor %}
      </tr>
    </thead>

    <tbody>
      {% for student in students %}
        <tr>
          <td>{{ student.username }}</td>

          {% for assessment in assessments %}
            <td>
              <input
                type="number"
                step="0.01"
                name="grade_{{ student.id }}_{{ assessment.id }}"
              >
            </td>
          {% endfor %}
        </tr>
      {% endfor %}
    </tbody>
  </table>

  <button type="submit">Save Grades</button>
</form>
